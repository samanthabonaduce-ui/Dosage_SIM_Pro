<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOSAGE SIM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #fdfdfd;
            --brand-blue: #2563eb;
            --calc-bg: #1e293b;
            --accent: #2563eb; 
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #334155;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            flex: 1;
            min-height: 0;
        }

        #viewport {
            background: var(--brand-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            overflow: hidden;
        }

        canvas { 
            background: white; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .sidebar {
            background: white;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            overflow-y: auto;
            height: 100%;
        }

        .calc-wrapper {
            background: var(--calc-bg);
            border-radius: 16px;
            padding: 16px;
            color: white;
            flex-shrink: 0;
        }
        .calc-display {
            background: #000;
            border-radius: 8px;
            padding: 12px;
            text-align: right;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .btn {
            height: 44px;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-op { background: var(--accent); }

        .brand-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .overlay.active { display: flex; }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0">
        <div class="flex items-center gap-5">
            <div class="brand-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
                    <path d="m8.5 8.5 7 7"/>
                    <circle cx="16" cy="18" r="3"/>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight leading-none">
                    <span class="text-slate-900">DOSAGE</span> 
                    <span class="text-blue-600">SIM</span> 
                    <span class="text-slate-900">Pro</span>
                </h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.1em] mt-1">CLINICAL DOSAGE CALCULATION MODE</p>
            </div>
        </div>
        <div class="flex gap-8">
            <div class="text-right">
                <span class="text-[10px] font-black text-slate-400 uppercase block">Active Station</span>
                <span id="level-label" class="text-lg font-bold text-slate-900">FLOOR 1</span>
            </div>
        </div>
    </header>

    <div class="app-container">
        <section id="viewport">
            <canvas id="game-canvas"></canvas>
            
            <div id="quiz-overlay" class="overlay">
                <div id="quiz-card" class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-2 h-2 rounded-full bg-blue-600"></div>
                        <span id="q-category" class="text-[10px] font-black uppercase text-slate-400">Order Verification</span>
                    </div>
                    <p id="q-text" class="text-lg font-bold text-slate-800 leading-tight mb-6"></p>
                    <div class="space-y-4">
                        <div class="relative">
                            <input type="number" id="q-input" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-4 text-2xl font-mono text-center outline-none focus:border-blue-600" placeholder="0.0">
                            <span id="q-unit" class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-400 uppercase">UNIT</span>
                        </div>
                        <button onclick="submitQuiz()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-blue-600 transition-colors">Verify Dosage</button>
                    </div>
                    <p id="q-feedback" class="mt-4 text-center text-[10px] font-bold uppercase h-4"></p>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="calc-wrapper shadow-xl">
                <div class="calc-display">
                    <div id="calc-hist" class="text-[10px] text-slate-400 h-4 mb-1"></div>
                    <div id="calc-main" class="text-2xl font-bold">0</div>
                </div>
                <div class="calc-grid">
                    <button class="btn col-span-2" onclick="calcAction('C')">CLEAR</button>
                    <button class="btn" onclick="calcAction('back')">DEL</button>
                    <button class="btn btn-op" onclick="calcAction('/')">÷</button>
                    <button class="btn" onclick="calcAction('7')">7</button>
                    <button class="btn" onclick="calcAction('8')">8</button>
                    <button class="btn" onclick="calcAction('9')">9</button>
                    <button class="btn btn-op" onclick="calcAction('*')">×</button>
                    <button class="btn" onclick="calcAction('4')">4</button>
                    <button class="btn" onclick="calcAction('5')">5</button>
                    <button class="btn" onclick="calcAction('6')">6</button>
                    <button class="btn btn-op" onclick="calcAction('-')">-</button>
                    <button class="btn" onclick="calcAction('1')">1</button>
                    <button class="btn" onclick="calcAction('2')">2</button>
                    <button class="btn" onclick="calcAction('3')">3</button>
                    <button class="btn btn-op" onclick="calcAction('+')">+</button>
                    <button class="btn col-span-2" onclick="calcAction('0')">0</button>
                    <button class="btn" onclick="calcAction('.')">.</button>
                    <button class="btn btn-op" onclick="calcAction('=')">=</button>
                </div>
            </div>

            <div class="flex-1">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Order Verification Tasks</h3>
                    <span id="progress-val" class="text-xs font-bold text-blue-600">0 / 6 Complete</span>
                </div>
                <div id="checklist-container"></div>
            </div>

            <div class="p-5 bg-blue-50 border border-blue-100 rounded-xl mb-6">
                <h4 class="text-[10px] font-black text-blue-600 uppercase mb-3 tracking-widest">Clinical Guidelines</h4>
                <ul id="guideline-list" class="text-[11px] text-blue-700 font-bold leading-relaxed space-y-2">
                    <li class="flex gap-2">
                        <span>•</span>
                        <span>Navigate to each yellow station on the critical path to verify medication orders.</span>
                    </li>
                </ul>
            </div>
        </aside>
    </div>

    <div id="finale-modal" class="fixed inset-0 bg-slate-900/95 z-[200] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[32px] p-10 max-w-2xl w-full">
            <h2 class="text-2xl font-black mb-2 text-slate-900">Med Room: Final Verification</h2>
            <p id="finale-math-q" class="text-slate-600 mb-8 font-semibold text-lg"></p>
            <div class="bg-slate-100 rounded-2xl p-10 mb-8 relative border-2 border-slate-200">
                <div id="draw-label" class="absolute top-4 right-4 bg-slate-900 text-white px-4 py-1 rounded-full font-bold text-sm">0.0 mL</div>
                <div id="syringe-container" class="h-20 w-full bg-white border-2 border-slate-300 rounded-r-[40px] relative overflow-hidden cursor-ew-resize">
                    <div id="plunger" class="absolute inset-y-0 left-0 bg-blue-500/30 border-r-4 border-blue-600 w-0"></div>
                </div>
            </div>
            <button onclick="checkFinal()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-sm uppercase tracking-widest hover:shadow-lg transition-all">Submit Precision Check</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const TILE = 40; 
        const SIZE_H = 15;
        const SIZE_W = 21;
        canvas.width = TILE * SIZE_W; canvas.height = TILE * SIZE_H;

        let state = {
            level: 1, maze: [], player: {x:1, y:1}, solved: 0,
            calcStr: "0", calcHist: "", active: true,
            currentQ: null, targetDose: 0, drawDose: 0,
            gates: [], activeCell: null
        };

        const BANK = [
            // Floor 1: PO, SQ, IM
            { floor: 1, q: "Order: Metoprolol 25 mg PO. Supply: 50 mg tablets. How many tabs?", a: 0.5, u: "TABS", type: "PO" },
            { floor: 1, q: "Order: Heparin 5,000 Units SQ. Supply: 10,000 Units/mL. How many mL?", a: 0.5, u: "mL", type: "SQ" },
            { floor: 1, q: "Order: Epinephrine 0.3 mg IM. Supply: 1 mg/mL. How many mL?", a: 0.3, u: "mL", type: "IM" },
            { floor: 1, q: "Order: Prednisone 10 mg PO. Supply: 5 mg tablets. How many tabs?", a: 2, u: "TABS", type: "PO" },
            { floor: 1, q: "Order: Amoxicillin 500 mg PO. Supply: 250 mg/5 mL. How many mL?", a: 10, u: "mL", type: "PO" },
            
            // Floor 2: IV Push
            { floor: 2, q: "Order: Digoxin 0.125 mg IV Push. Supply: 0.25 mg/mL. How many mL?", a: 0.5, u: "mL", type: "IVP" },
            { floor: 2, q: "Order: Morphine 4 mg IV Push. Supply: 10 mg/mL. How many mL?", a: 0.4, u: "mL", type: "IVP" },
            { floor: 2, q: "Order: Furosemide 40 mg IV Push. Supply: 10 mg/mL. How many mL?", a: 4, u: "mL", type: "IVP" },
            { floor: 2, q: "Order: Hydromorphone 0.5 mg IV Push. Supply: 2 mg/mL. How many mL?", a: 0.25, u: "mL", type: "IVP" },
            { floor: 2, q: "Order: Ondansetron 4 mg IV Push. Supply: 2 mg/mL. How many mL?", a: 2, u: "mL", type: "IVP" },

            // Floor 3: IV mL/hr
            { floor: 3, q: "Order: 1,000 mL NS to infuse over 8 hours. What is the mL/hr rate?", a: 125, u: "mL/hr", type: "INF" },
            { floor: 3, q: "Order: 500 mL D5W to infuse over 4 hours. What is the mL/hr rate?", a: 125, u: "mL/hr", type: "INF" },
            { floor: 3, q: "Order: Vancomycin 1g in 250 mL NS to infuse over 2 hours. What is the mL/hr rate?", a: 125, u: "mL/hr", type: "INF" },
            { floor: 3, q: "Order: Ciprofloxacin 400mg in 200 mL to infuse over 60 min. What is the mL/hr rate?", a: 200, u: "mL/hr", type: "INF" },

            // Floor 4: IV gtt/min
            { floor: 4, q: "Order: 100 mL NS over 30 min. Tubing drop factor: 15 gtt/mL. Calculate gtt/min.", a: 50, u: "gtt/min", type: "DRIP" },
            { floor: 4, q: "Order: 1,000 mL LR over 10 hours. Drop factor: 10 gtt/mL. Calculate gtt/min.", a: 17, u: "gtt/min", type: "DRIP" },
            { floor: 4, q: "Order: 50 mL antibiotic over 20 min. Drop factor: 60 gtt/mL (microdrip). Calculate gtt/min.", a: 150, u: "gtt/min", type: "DRIP" },
            { floor: 4, q: "Order: 250 mL NS over 2 hours. Drop factor: 20 gtt/mL. Calculate gtt/min.", a: 42, u: "gtt/min", type: "DRIP" },

            // Floor 6: IV per kg
            { floor: 6, q: "Order: Dopamine 5 mcg/kg/min. Patient weight: 80 kg. Supply: 400 mg/250 mL. What is the mcg/min dose?", a: 400, u: "mcg/min", type: "WBT" },
            { floor: 6, q: "Order: Heparin 18 units/kg/hr. Patient weight: 70 kg. Supply: 25,000 units/500 mL. Calculate units/hr.", a: 1260, u: "units/hr", type: "WBT" },
            { floor: 6, q: "Order: Propofol 10 mcg/kg/min. Patient weight: 100 kg. What is the mcg/min dose?", a: 1000, u: "mcg/min", type: "WBT" },
            { floor: 6, q: "Order: Dobutamine 2.5 mcg/kg/min. Patient weight: 60 kg. What is the mcg/min dose?", a: 150, u: "mcg/min", type: "WBT" }
        ];

        function findPath(start, end) {
            let queue = [[start]];
            let visited = new Set();
            visited.add(`${start.x},${start.y}`);
            while(queue.length > 0) {
                let path = queue.shift();
                let node = path[path.length - 1];
                if(node.x === end.x && node.y === end.y) return path;
                [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                    let nx = node.x + dx, ny = node.y + dy;
                    if(nx >= 0 && nx < SIZE_W && ny >= 0 && ny < SIZE_H && state.maze[ny][nx] !== 1 && !visited.has(`${nx},${ny}`)) {
                        visited.add(`${nx},${ny}`);
                        queue.push([...path, {x: nx, y: ny}]);
                    }
                });
            }
            return [];
        }

        function initMaze() {
            state.maze = Array(SIZE_H).fill().map(() => Array(SIZE_W).fill(1));
            const stack = [{x:1, y:1}];
            state.maze[1][1] = 0;
            while(stack.length) {
                const c = stack[stack.length-1];
                const ns = [[0,2],[0,-2],[2,0],[-2,0]].map(([dx,dy])=>({x:c.x+dx, y:c.y+dy, mx:c.x+dx/2, my:c.y+dy/2}))
                    .filter(n => n.x>0 && n.x<SIZE_W-1 && n.y>0 && n.y<SIZE_H-1 && state.maze[n.y][n.x]===1);
                if(ns.length) {
                    const n = ns[Math.floor(Math.random()*ns.length)];
                    state.maze[n.y][n.x] = 0; state.maze[n.my][n.mx] = 0;
                    stack.push(n);
                } else stack.pop();
            }

            const criticalPath = findPath({x:1, y:1}, {x:SIZE_W-2, y:SIZE_H-2});
            state.gates = [];

            let pathOptions = criticalPath.slice(2, -2).sort(() => Math.random() - 0.5);
            let placedCount = 0;
            for(let opt of pathOptions) {
                if(placedCount >= 6) break;
                if(state.gates.every(g => Math.abs(g.x-opt.x)+Math.abs(g.y-opt.y) >= 4)) {
                    state.maze[opt.y][opt.x] = 2; 
                    state.gates.push(opt);
                    placedCount++;
                }
            }

            let pathSet = new Set(criticalPath.map(p => `${p.x},${p.y}`));
            let offPathOptions = [];
            for(let y=0; y<SIZE_H; y++) {
                for(let x=0; x<SIZE_W; x++) {
                    if(state.maze[y][x] === 0 && !pathSet.has(`${x},${y}`)) offPathOptions.push({x, y});
                }
            }
            offPathOptions.sort(() => Math.random() - 0.5);
            let distractorCount = 0;
            for(let opt of offPathOptions) {
                if(distractorCount >= 4) break;
                if(state.gates.every(g => Math.abs(g.x-opt.x)+Math.abs(g.y-opt.y) >= 4)) {
                    state.maze[opt.y][opt.x] = 5; 
                    state.gates.push(opt);
                    distractorCount++;
                }
            }

            state.maze[SIZE_H-2][SIZE_W-2] = 3; 
            state.maze[1][1] = 6; 
            state.solved = 0; state.player = {x:1, y:1};
            updateUI(); draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let y=0; y<SIZE_H; y++) {
                for(let x=0; x<SIZE_W; x++) {
                    const cell = state.maze[y][x];
                    const px = x*TILE; const py = y*TILE;

                    if(cell === 1) { 
                        ctx.fillStyle = "#cbd5e1"; ctx.fillRect(px, py, TILE, TILE); 
                    } else if (cell === 6) {
                        ctx.fillStyle = "#eff6ff"; ctx.fillRect(px, py, TILE, TILE);
                        ctx.fillStyle = "#2563eb"; ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 8);
                    } else {
                        ctx.fillStyle = "white"; ctx.fillRect(px, py, TILE, TILE);
                    }

                    if(cell === 2 || cell === 5) {
                        ctx.fillStyle = "#f59e0b"; 
                        ctx.beginPath(); ctx.arc(px+TILE/2, py+TILE/2, TILE/3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "white"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center";
                        ctx.fillText("Rx", px+TILE/2, py+TILE/2+4);
                    }
                    if(cell === 4) {
                        ctx.fillStyle = "#10b981";
                        ctx.beginPath(); ctx.arc(px+TILE/2, py+TILE/2, TILE/3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "white"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center";
                        ctx.fillText("✔", px+TILE/2, py+TILE/2+4);
                    }
                    if(cell === 3) {
                        const unlocked = state.solved >= 6;
                        ctx.fillStyle = unlocked ? "#10b981" : "#475569";
                        ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
                        ctx.fillStyle = "white"; ctx.font = "bold 7px sans-serif"; ctx.textAlign = "center";
                        ctx.fillText(unlocked ? "OPEN" : "LOCKED", px+TILE/2, py+TILE/2-1);
                        ctx.fillText("MED RM", px+TILE/2, py+TILE/2+7);
                    }
                }
            }
            ctx.fillStyle = "#2563eb";
            ctx.beginPath(); ctx.arc(state.player.x*TILE+TILE/2, state.player.y*TILE+TILE/2, 10, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
        }

        function move(dx, dy) {
            if(!state.active) return;
            const nx = state.player.x + dx, ny = state.player.y + dy;
            if(nx>=0 && nx<SIZE_W && ny>=0 && ny<SIZE_H && state.maze[ny][nx] !== 1) {
                if(state.maze[ny][nx] === 3 && state.solved < 6) return;
                state.player = {x:nx, y:ny};
                if(state.maze[ny][nx] === 2 || state.maze[ny][nx] === 5) openQuiz(nx, ny, state.maze[ny][nx]);
                if(state.maze[ny][nx] === 3) openFinale();
            }
            draw();
        }

        function openQuiz(x, y, type) {
            state.active = false; 
            state.activeCell = {x, y, type};
            
            // Filter bank based on current level rules
            let possibleQs = BANK.filter(q => q.floor === state.level);
            // Fallback for Floor 5 (Mixed) or if no specific floor rules exist
            if(possibleQs.length === 0) possibleQs = BANK;

            state.currentQ = possibleQs[Math.floor(Math.random()*possibleQs.length)];
            
            document.getElementById('q-category').innerText = `Verification: ${state.currentQ.type}`;
            document.getElementById('q-text').innerText = state.currentQ.q;
            document.getElementById('q-unit').innerText = state.currentQ.u;
            document.getElementById('q-input').value = "";
            document.getElementById('q-feedback').innerText = "";
            document.getElementById('quiz-overlay').classList.add('active');
            setTimeout(() => document.getElementById('q-input').focus(), 100);
        }

        function submitQuiz() {
            const val = parseFloat(document.getElementById('q-input').value);
            const feedback = document.getElementById('q-feedback');
            const card = document.getElementById('quiz-card');
            
            if(isNaN(val)) {
                feedback.innerText = "ENTER A VALUE";
                feedback.className = "mt-4 text-center text-[10px] font-bold uppercase h-4 text-red-500";
                return;
            }

            // Margin of error for rounding differences
            if(Math.abs(val - state.currentQ.a) < 1.01) {
                if(state.activeCell.type === 2) {
                    state.solved++;
                }
                state.maze[state.activeCell.y][state.activeCell.x] = 4;
                closeQuiz(); 
                updateUI(); 
                draw();
            } else {
                feedback.innerText = "INCORRECT DOSAGE";
                feedback.className = "mt-4 text-center text-[10px] font-bold uppercase h-4 text-red-500";
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        }

        function closeQuiz() { 
            state.active = true; 
            document.getElementById('quiz-overlay').classList.remove('active'); 
        }

        function openFinale() {
            state.active = false;
            state.targetDose = (Math.random() * 8 + 1).toFixed(1);
            document.getElementById('finale-math-q').innerText = `Med Room Access Task: Draw exactly ${state.targetDose} mL into the syringe.`;
            document.getElementById('finale-modal').style.display = 'flex';
            const syringe = document.getElementById('syringe-container');
            const plunger = document.getElementById('plunger');
            const label = document.getElementById('draw-label');
            const update = (e) => {
                const rect = syringe.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
                plunger.style.width = pct + "%";
                state.drawDose = (pct / 10).toFixed(1);
                label.innerText = state.drawDose + " mL";
            };
            const track = (e) => {
                update(e);
                const stop = () => { window.removeEventListener('mousemove', update); window.removeEventListener('touchmove', update); };
                window.addEventListener('mousemove', update);
                window.addEventListener('touchmove', update);
                window.addEventListener('mouseup', stop, {once:true});
                window.addEventListener('touchend', stop, {once:true});
            };
            syringe.onmousedown = track; syringe.ontouchstart = track;
        }

        function checkFinal() {
            if(Math.abs(state.drawDose - state.targetDose) < 0.2) {
                document.getElementById('finale-modal').style.display = 'none';
                state.level++; initMaze(); state.active = true;
            }
        }

        function calcAction(val) {
            if(val === 'C') { state.calcStr = "0"; state.calcHist = ""; }
            else if(val === 'back') { state.calcStr = state.calcStr.length > 1 ? state.calcStr.slice(0,-1) : "0"; }
            else if(val === '=') {
                try {
                    let res = eval(state.calcStr.replace('×','*').replace('÷','/'));
                    state.calcHist = state.calcStr + " =";
                    state.calcStr = Number(res.toFixed(4)).toString();
                } catch { state.calcStr = "Err"; }
            } else {
                if(state.calcStr === "0" && val !== '.') state.calcStr = val;
                else state.calcStr += val;
            }
            document.getElementById('calc-main').innerText = state.calcStr;
            document.getElementById('calc-hist').innerText = state.calcHist;
        }

        function updateUI() {
            document.getElementById('level-label').innerText = `FLOOR ${state.level}`;
            document.getElementById('progress-val').innerText = `${state.solved} / 6 Complete`;
            const cont = document.getElementById('checklist-container');
            cont.innerHTML = "";
            for(let i=1; i<=6; i++) {
                const active = i <= state.solved;
                cont.innerHTML += `
                    <div class="checklist-item ${active ? 'text-slate-900' : 'text-slate-300'}">
                        <div class="w-4 h-4 rounded-full border-2 ${active ? 'bg-blue-600 border-blue-600' : 'border-slate-200'} flex items-center justify-center">
                            ${active ? '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>' : ''}
                        </div>
                        Med Order Verification #${i}
                    </div>
                `;
            }

            // Update Guidelines text based on floor
            const guideList = document.getElementById('guideline-list');
            let floorDesc = "Complete the medication orders for this floor.";
            switch(state.level) {
                case 1: floorDesc = "Floor Focus: PO (Oral), SQ (Subcutaneous), and IM (Intramuscular) doses."; break;
                case 2: floorDesc = "Floor Focus: IV Push (IVP) medication calculations."; break;
                case 3: floorDesc = "Floor Focus: IV Infusion (mL/hr) calculations."; break;
                case 4: floorDesc = "Floor Focus: IV Drip Rates (gtt/min) using gravity tubing."; break;
                case 5: floorDesc = "Floor Focus: Mixed Clinical Modalities (Review Floor)."; break;
                case 6: floorDesc = "Floor Focus: Weight-based (per kg) IV calculations."; break;
            }
            guideList.innerHTML = `
                <li class="flex gap-2"><span>•</span><span>${floorDesc}</span></li>
                <li class="flex gap-2"><span>•</span><span>Navigate to yellow Rx stations on the critical path.</span></li>
            `;
        }

        window.onkeydown = (e) => {
            if(e.key === 'ArrowUp') move(0,-1);
            if(e.key === 'ArrowDown') move(0,1);
            if(e.key === 'ArrowLeft') move(-1,0);
            if(e.key === 'ArrowRight') move(1,0);
        };

        initMaze();
    </script>
</body>
</html>
